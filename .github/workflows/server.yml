name: Minecraft Server
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download PaperMC
        run: |
          curl -L -o server.jar "https://api.papermc.io/v2/projects/paper/versions/1.20.4/builds/496/downloads/paper-1.20.4-496.jar"
          ls -lh server.jar

      - name: Download Plugins
        run: |
          mkdir -p plugins
          curl -L -o plugins/ViaVersion.jar "https://github.com/ViaVersion/ViaVersion/releases/download/4.9.3/ViaVersion-4.9.3.jar"
          curl -L -o plugins/ViaBackwards.jar "https://github.com/ViaVersion/ViaBackwards/releases/download/4.9.3/ViaBackwards-4.9.3.jar"
          curl -L -o plugins/EssentialsX.jar "https://github.com/EssentialsX/Essentials/releases/download/2.21.2/EssentialsX-2.21.2.jar"
          curl -L -o plugins/EssentialsXChat.jar "https://github.com/EssentialsX/Essentials/releases/download/2.21.2/EssentialsXChat-2.21.2.jar"
          curl -L -o plugins/Vault.jar "https://github.com/MilkBowl/Vault/releases/download/1.7.3/Vault.jar"
          curl -L -o plugins/LuckPerms.jar "https://download.luckperms.net/1544/bukkit/loader/LuckPerms-Bukkit-5.4.141.jar"
          curl -L -o plugins/GriefPrevention.jar "https://github.com/TechFortress/GriefPrevention/releases/download/16.18/GriefPrevention-16.18.jar"
          curl -L -o plugins/SimpleTPA.jar "https://github.com/LOOHP/SimpleTPA/releases/download/1.0.5/SimpleTPA-1.0.5.jar"
          curl -L -o plugins/OnePlayerSleep.jar "https://github.com/vinceh121/1PlayerSleep/releases/download/2.1.0/1PlayerSleep-2.1.0.jar"
          ls -lh plugins/

      - name: Install ngrok
        run: |
          curl -L https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz | tar xz
          sudo mv ngrok /usr/local/bin/
          ngrok version

      - name: Start ngrok tunnel
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          ngrok authtoken "$NGROK_TOKEN"
          ngrok tcp 25565 > /tmp/ngrok.log 2>&1 &
          sleep 30
          for i in 1 2 3 4 5; do
            RESULT=$(curl -s http://localhost:4040/api/tunnels)
            if [ -n "$RESULT" ]; then
              echo "$RESULT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          tunnels = data.get('tunnels', [])
          if tunnels:
            addr = tunnels[0]['public_url'].replace('tcp://', '')
            print('============================')
            print('SERVER ADDRESS:', addr)
            print('============================')
          "
              break
            fi
            echo "Waiting... attempt $i"
            sleep 5
          done

      - name: Start Minecraft Server
        run: |
          echo "eula=true" > eula.txt
          java -Xmx3G -Xms1G -jar server.jar nogui
