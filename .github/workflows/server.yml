name: Minecraft Server

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download PaperMC
        run: |
          curl -L -o server.jar "https://api.papermc.io/v2/projects/paper/versions/1.20.4/builds/496/downloads/paper-1.20.4-496.jar"
          ls -la server.jar
          echo "server.jar size: $(du -h server.jar)"

      - name: Download Plugins
        run: |
          mkdir -p plugins

          curl -L -o plugins/ViaVersion.jar "https://github.com/ViaVersion/ViaVersion/releases/download/4.9.2/ViaVersion-4.9.2.jar"
          echo "ViaVersion done"

          curl -L -o plugins/ViaBackwards.jar "https://github.com/ViaVersion/ViaBackwards/releases/download/4.9.2/ViaBackwards-4.9.2.jar"
          echo "ViaBackwards done"

          curl -L -o plugins/EssentialsX.jar "https://github.com/EssentialsX/Essentials/releases/download/2.20.1/EssentialsX-2.20.1.jar"
          echo "EssentialsX done"

          curl -L -o plugins/EssentialsXChat.jar "https://github.com/EssentialsX/Essentials/releases/download/2.20.1/EssentialsXChat-2.20.1.jar"
          echo "EssentialsXChat done"

          curl -L -o plugins/Vault.jar "https://github.com/MilkBowl/Vault/releases/download/1.7.3/Vault.jar"
          echo "Vault done"

          curl -L -o plugins/LuckPerms.jar "https://download.luckperms.net/1544/bukkit/loader/LuckPerms-Bukkit-5.4.141.jar"
          echo "LuckPerms done"

          curl -L -o plugins/GriefPrevention.jar "https://github.com/TechFortress/GriefPrevention/releases/download/16.18/GriefPrevention-16.18.jar"
          echo "GriefPrevention done"

          curl -L -o plugins/SimpleTPA.jar "https://github.com/LOOHP/SimpleTPA/releases/download/1.0.5/SimpleTPA-1.0.5.jar"
          echo "SimpleTPA done"

          curl -L -o plugins/OnePlayerSleep.jar "https://github.com/vinceh121/1PlayerSleep/releases/download/2.1.0/1PlayerSleep-2.1.0.jar"
          echo "1PlayerSleep done"

          ls -la plugins/

      - name: Install playit.gg
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/playit-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/playit-archive-keyring.gpg] https://playit-cloud.github.io/ppa/data ./" | sudo tee /etc/apt/sources.list.d/playit-cloud.list
          sudo apt update
          sudo apt install playit -y

      - name: Start playit.gg tunnel
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          playit --secret "$PLAYIT_SECRET" > /tmp/playit.log 2>&1 &
          sleep 15
          cat /tmp/playit.log || true

      - name: Accept EULA and Start Minecraft Server
        run: |
          echo "eula=true" > eula.txt
          java -Xmx3G -Xms1G -jar server.jar nogui
