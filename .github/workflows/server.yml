name: Minecraft Server
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download PaperMC
        run: |
          curl -L -o server.jar "https://api.papermc.io/v2/projects/paper/versions/1.20.4/builds/496/downloads/paper-1.20.4-496.jar"
          ls -lh server.jar

      - name: Download Plugins
        run: |
          mkdir -p plugins
          curl -L -o plugins/ViaVersion.jar "https://github.com/ViaVersion/ViaVersion/releases/download/4.9.3/ViaVersion-4.9.3.jar"
          curl -L -o plugins/EssentialsX.jar "https://github.com/EssentialsX/Essentials/releases/download/2.21.2/EssentialsX-2.21.2.jar"
          curl -L -o plugins/EssentialsXChat.jar "https://github.com/EssentialsX/Essentials/releases/download/2.21.2/EssentialsXChat-2.21.2.jar"
          curl -L -o plugins/Vault.jar "https://github.com/MilkBowl/Vault/releases/download/1.7.3/Vault.jar"
          ls -lh plugins/

      - name: Start Server and Tunnel
        run: |
          echo "eula=true" > eula.txt

          # Start Minecraft server in background
          java -Xmx3G -Xms1G -jar server.jar nogui &
          SERVER_PID=$!

          # Wait for server to fully start
          echo "Waiting for server to start..."
          sleep 90

          # Start tunnel and capture output
          ssh -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -R 25565:localhost:25565 \
              plan@ssh.localhost.run 2>&1 | while read line; do
            echo "$line"
            if echo "$line" | grep -q "localhost.run"; then
              echo "================================"
              echo "YOUR SERVER ADDRESS:"
              echo "$line" | grep -o '[a-zA-Z0-9-]*\.localhost\.run'
              echo "PORT: 25565"
              echo "================================"
            fi
          done &

          sleep 20
          echo "Tunnel started! Check above for address!"

          # Keep server running
          wait $SERVER_PID
